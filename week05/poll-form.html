<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=0.1">
    <title>WDD 130 | HTML Form - user poll</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
     <link rel="stylesheet" href="styles/poll-form.css">    

</head>
<body>
<header>
    <h1>WDD 130 | Prosper Eze | HTML Form - User Poll</h1>
</header>  
<main>
    <form>
        <fieldset>
            <legend>Contact Information</legend>
            <label for="Fullname">Full name:</label>
            <input type="Text" id="Fullname" name="Fullname">
            <label for="Userename">Email:</label>
            <input type="email" id="Useremail" name="Useremail">
        </fieldset>  
        <fieldset>  
            <legend>Questions</legend>
            <label for="Browser">what is your favorite internet Browser?</label>
            <select id="Browser" name="Browser">
                <option value="chrome">Chrome</option>
                <option value="firefox">firefox</option>
                <option value="safari">safari</option>
                <option value="brave">brave</option>
                <option value="edge">edge</option>
                <option value="other">other</option>
            </select>
            <label for="pet">Do you have a house hold Pet?</label>
            <input type="checkbox" id="Pet" name="pet">
            <label for="feedback">List the places you have lived:</label>
            <textarea id="feedback" name="feedback" rows="4" placeholder="Nigeria, Ghana, Senagal, Togo, Kenya, India,"></textarea>
        </fieldset>
        <button type="submit">Submit Poll</button>
        <div class="form-item column1"> 
            <label for="Fullname">Full Name:</label>
            <input type="text" id="Fullname" name="fullname">
        </div>
        <div class="form-item column2">
            <label for="Userename">Email:</label>
            <input type="email" id="Usermil" name="Usermil">
        </div>
    </form>        
</main>

 <footer>
    <p>©2025 | HTML Form - User Poll ACtivity | Prosper Eze</p>
</footer>   
</body> 
</html>
